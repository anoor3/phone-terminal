# Fly.io configuration for phone-terminal
# Deploy with: fly deploy

app = "phone-terminal"
primary_region = "iad"  # US East - change if you want closer to you

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  # ALLOWED_ORIGINS set via: fly secrets set ALLOWED_ORIGINS=https://phone-terminal.fly.dev
  # DATABASE_URL set via: fly secrets set DATABASE_URL=postgresql://...

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
